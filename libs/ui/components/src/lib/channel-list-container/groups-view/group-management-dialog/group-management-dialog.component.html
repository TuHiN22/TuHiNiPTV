<h2 mat-dialog-title>{{ 'Manage groups' }}</h2>

<mat-dialog-content>
    <div class="header-actions">
        <div class="selection-info">
            {{ 'Selected' }}: <strong>{{ selectedCount() }}</strong> /
            {{ totalCount() }}
        </div>
        <div class="bulk-actions">
            <button
                mat-stroked-button
                (click)="selectAll()"
                [disabled]="allSelected()"
            >
                <mat-icon>check_box</mat-icon>
                {{ 'Select all' }}
            </button>
            <button
                mat-stroked-button
                (click)="deselectAll()"
                [disabled]="selectedCount() === 0"
            >
                <mat-icon>check_box_outline_blank</mat-icon>
                {{ 'Deselect all' }}
            </button>
        </div>
    </div>

    <label class="search-inline">
        <mat-icon class="search-inline__icon">search</mat-icon>
        <input
            type="search"
            spellcheck="false"
            [value]="searchTerm()"
            (input)="searchTerm.set($any($event.target).value)"
            [placeholder]="'Search groups...'"
        />
        @if (searchTerm()) {
            <button
                type="button"
                mat-icon-button
                class="search-inline__clear"
                (click)="clearSearch()"
            >
                <mat-icon>close</mat-icon>
            </button>
        }
    </label>

    <div class="groups-list">
        @for (group of filteredGroups(); track group.key) {
            <div class="group-item" (click)="toggleGroup(group)">
                <mat-checkbox
                    [checked]="group.selected"
                    (click)="$event.stopPropagation()"
                    (change)="toggleGroup(group)"
                >
                </mat-checkbox>
                <span class="group-name">
                    @if (group.key) {
                        {{ group.key | titlecase }}
                    } @else {
                        {{ 'Ungrouped' }}
                    }
                </span>
                <span class="item-count">({{ group.count }})</span>
            </div>
        } @empty {
            <div class="empty-message">
                {{ 'No matching groups found' }}
            </div>
        }
    </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">
        {{ 'Close' }}
    </button>
    <button mat-flat-button color="primary" (click)="save()">
        {{ 'Save' }}
    </button>
</mat-dialog-actions>
