@if (isVisible()) {
    <div class="drop-overlay__backdrop" aria-hidden="true"></div>
    <div
        class="drop-overlay__card"
        [class.is-rejected]="isRejected()"
        role="status"
        aria-live="polite"
    >
        <div class="drop-overlay__icon-wrap">
            <mat-icon class="drop-overlay__icon">
                {{ isRejected() ? 'error_outline' : 'file_download' }}
            </mat-icon>
        </div>
        <h2 class="drop-overlay__title">
            {{ isRejected() ? rejectionKey() : 'Drop to add playlist' }}
        </h2>
        <p class="drop-overlay__body">
            {{
                isRejected()
                    ? 'Please drop an .m3u or .m3u8 file. Press Esc to dismiss.'
                    : 'Release an .m3u or .m3u8 file anywhere in the workspace to import it.'
            }}
        </p>
    </div>
}
